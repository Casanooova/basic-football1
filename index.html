<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #08101e;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 20;
    color: white;
    background: rgba(0,0,0,0.35);
    padding: 10px 12px;
    border-radius: 12px;
    min-width: 270px;
    font-size: 14px;
  }

  #subinfo {
    margin-top: 4px;
    opacity: 0.95;
  }

  #playSelect {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 96px;
    z-index: 20;
    display: flex;
    gap: 8px;
  }

  .playBtn, #snapBtn {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-weight: bold;
    font-size: 14px;
    color: white;
    background: rgba(0,0,0,0.45);
  }

  .playBtn.active {
    background: #1b8f3a;
  }

  #snapBtn {
    position: fixed;
    right: 16px;
    bottom: 24px;
    z-index: 20;
    width: 92px;
    height: 54px;
  }

  #joystick {
    position: fixed;
    left: 16px;
    bottom: 20px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    z-index: 20;
    touch-action: none;
  }

  #stick {
    position: absolute;
    left: 35px;
    top: 35px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.42);
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div id="info">Pick a play</div>
  <div id="subinfo">Ball: 25 | 1st & 15</div>
</div>

<div id="playSelect">
  <button class="playBtn" data-play="run">RUN</button>
  <button class="playBtn" data-play="short">SHORT</button>
  <button class="playBtn" data-play="long">LONG</button>
</div>

<button id="snapBtn">SNAP</button>

<div id="joystick">
  <div id="stick"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const infoEl = document.getElementById("info");
const subinfoEl = document.getElementById("subinfo");
const playBtns = Array.from(document.querySelectorAll(".playBtn"));
const snapBtn = document.getElementById("snapBtn");
const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const FIELD = {
  startBall: 25,
  firstDownDistance: 15,
  goalLine: 50,
  backOfEndZone: 60,
  visibleDepthYards: 38,
  widthHalf: 30
};

const PLAY_VARIANTS = {
  run: ["inside", "offTackle", "sweep", "counter", "dart", "stretch", "draw"],
  short: ["slantPost", "slantCross", "curlSit", "doubleIn", "postFlat", "digSlant", "stick"],
  long: ["goPost", "postCross", "streakBend", "doublePost", "deepCrossGo", "cornerPost", "seamOver"]
};

const game = {
  selectedPlay: null,
  selectedVariant: null,
  playStarted: false,
  ballYards: FIELD.startBall,
  lineOfScrimmage: FIELD.startBall,
  down: 1,
  firstDownTarget: FIELD.startBall + FIELD.firstDownDistance
};

let joy = { x: 0, y: 0 };
let holdStart = 0;
let playFrames = 0;
let runReadFrames = 0;
let qbPastLOS = false;
let runForceFrames = 0;
let runHasCrossedLOS = false;

let playResultText = "";
let playResultTimer = 0;
let resetTimer = 0;

let coverageType = "cover1";
let passRushMove = "inside";
let blitzSide = "left";
let rbAlignment = "rightOffset";
let offenseSet = "spread";
let defenseShell = "base";

let qb, rb, wr1, wr2, ol;
let lb, rusher, cb1, cb2, safety;
let offense = [];
let defense = [];
let ballCarrier = null;

let currentThrow = null;
let pendingTarget = null;

let tendency = {
  run: 0,
  short: 0,
  long: 0,
  insideRun: 0,
  outsideRun: 0
};

function choice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function prettyVariant(v) {
  if (!v) return "";
  return v.replace(/([A-Z])/g, " $1").replace(/^./, c => c.toUpperCase());
}

function ordinal(n) {
  if (n === 1) return "1st";
  if (n === 2) return "2nd";
  if (n === 3) return "3rd";
  return `${n}th`;
}

function prettyCoverageName(cov) {
  if (cov === "cover1") return "Cover 1";
  if (cov === "cover2") return "Cover 2";
  if (cov === "cover3") return "Cover 3";
  if (cov === "blitz") return "Blitz";
  return "Zone";
}

function prettyOffenseSet(set) {
  if (set === "twinsLeft") return "Twins Left";
  if (set === "twinsRight") return "Twins Right";
  return "Spread";
}

function prettyDefenseShell(shell) {
  if (shell === "twoHigh") return "Two-High";
  return "Base";
}

function decayTendencies() {
  tendency.run *= 0.82;
  tendency.short *= 0.82;
  tendency.long *= 0.82;
  tendency.insideRun *= 0.82;
  tendency.outsideRun *= 0.82;
}

function recordPlayTendency() {
  decayTendencies();

  if (game.selectedPlay === "run") {
    tendency.run += 1;

    if (["inside", "dart", "draw", "offTackle", "counter"].includes(game.selectedVariant)) {
      tendency.insideRun += 1;
    }
    if (["sweep", "stretch"].includes(game.selectedVariant)) {
      tendency.outsideRun += 1;
    }
  }

  if (game.selectedPlay === "short") tendency.short += 1;
  if (game.selectedPlay === "long") tendency.long += 1;
}

function getTendencyBias() {
  const total = tendency.run + tendency.short + tendency.long + 0.001;
  return {
    runRate: tendency.run / total,
    shortRate: tendency.short / total,
    longRate: tendency.long / total,
    insideRunRate: tendency.insideRun / Math.max(0.001, tendency.run),
    outsideRunRate: tendency.outsideRun / Math.max(0.001, tendency.run)
  };
}

function updateHud() {
  const toGo = Math.max(0, game.firstDownTarget - game.ballYards);
  const bias = getTendencyBias();

  let title = "Pick a play";
  if (game.selectedPlay && !game.playStarted) {
    title = `${game.selectedPlay.toUpperCase()} - ${prettyVariant(game.selectedVariant)} | ${prettyOffenseSet(offenseSet)} vs ${prettyDefenseShell(defenseShell)}`;
  } else if (game.selectedPlay && game.playStarted) {
    title = `${game.selectedPlay.toUpperCase()} live | ${prettyCoverageName(coverageType)} | ${prettyDefenseShell(defenseShell)}`;
  }

  infoEl.textContent = title;
  subinfoEl.textContent =
    `Ball: ${game.ballYards} | ${ordinal(game.down)} & ${toGo} | Tend: R ${(bias.runRate*100)|0}% S ${(bias.shortRate*100)|0}% L ${(bias.longRate*100)|0}%`;
}

function showPlayResult(text, duration = 75, resetDelay = 46) {
  playResultText = text;
  playResultTimer = duration;
  resetTimer = resetDelay;
}

function resetDrive(resultText) {
  game.ballYards = FIELD.startBall;
  game.lineOfScrimmage = FIELD.startBall;
  game.down = 1;
  game.firstDownTarget = FIELD.startBall + FIELD.firstDownDistance;
  showPlayResult(resultText);
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function getTempoScale() {
  return Math.min(1, 0.3 + playFrames / 80);
}

function getFieldGeometry() {
  return {
    bottomLeft: canvas.width * 0.02,
    bottomRight: canvas.width * 0.98,
    topLeft: canvas.width * 0.32,
    topRight: canvas.width * 0.68,
    topY: canvas.height * 0.05,
    bottomY: canvas.height * 0.995
  };
}

function projectFieldPoint(fx, fy) {
  const f = getFieldGeometry();
  const nearY = canvas.height * 0.86;
  const tDepth = (fy - (game.lineOfScrimmage - 12)) / (FIELD.visibleDepthYards + 12);
  const depth = Math.max(0, Math.min(1, tDepth));

  const worldY = nearY - depth * (nearY - f.topY);

  const nearWidth = canvas.width * 0.98;
  const farWidth = canvas.width * 0.34;
  const width = lerp(nearWidth, farWidth, depth);

  const centerX = canvas.width / 2;
  const normalizedX = fx / FIELD.widthHalf;
  const screenX = centerX + normalizedX * (width / 2);

  return {
    x: screenX,
    y: worldY,
    scale: lerp(1.22, 0.42, depth)
  };
}

function clampFieldX(p, margin = 0) {
  const limit = FIELD.widthHalf - p.radius - margin;
  p.fx = Math.max(-limit, Math.min(limit, p.fx));
}

function clampDepth(p) {
  const minDepth = game.lineOfScrimmage - 18;
  const maxDepth = FIELD.backOfEndZone;
  p.fy = Math.max(minDepth, Math.min(maxDepth, p.fy));
}

function makePlayer(name, role, fx, fy, color, radius = 1.15) {
  return {
    name,
    role,
    fx,
    fy,
    color,
    radius,
    routeKind: "idle",
    routeStep: 0,
    assignment: "neutral",
    isOpen: false,
    engaged: false,
    blockTimer: 0,
    blockTarget: null,
    style: ""
  };
}

function chooseOffenseSet() {
  return choice(["spread", "twinsLeft", "twinsRight"]);
}

function chooseDefenseShell() {
  const toGo = Math.max(0, game.firstDownTarget - game.ballYards);
  const isLong = game.selectedPlay === "long" || toGo >= 7;
  const bias = getTendencyBias();

  let twoHighChance = 0.38;

  if (isLong) twoHighChance += 0.18;
  if (bias.longRate > 0.48) twoHighChance += 0.24;
  if (bias.shortRate > 0.48) twoHighChance += 0.08;
  if (bias.runRate > 0.58) twoHighChance -= 0.18;
  if (bias.insideRunRate > 0.58 && bias.runRate > 0.45) twoHighChance -= 0.10;

  twoHighChance = Math.max(0.12, Math.min(0.82, twoHighChance));
  return Math.random() < twoHighChance ? "twoHigh" : "base";
}

function getSupportDefender() {
  return lb;
}

function buildFormation() {
  const los = game.lineOfScrimmage;

  qb = makePlayer("QB", "QB", 0, los - 5.5, "#e63946", 1.25);

  let rbFx = 4.5;
  let rbFy = los - 7.6;
  if (rbAlignment === "leftOffset") {
    rbFx = -4.5;
    rbFy = los - 7.4;
  } else if (rbAlignment === "rightOffset") {
    rbFx = 4.5;
    rbFy = los - 7.4;
  } else if (rbAlignment === "deep") {
    rbFx = 0;
    rbFy = los - 9.3;
  } else if (rbAlignment === "pistol") {
    rbFx = 0;
    rbFy = los - 7.8;
  }

  rb = makePlayer("RB", "RB", rbFx, rbFy, "#4aa3ff", 1.1);
  ol = makePlayer("OL", "OL", 0, los - 0.1, "#4aa3ff", 1.25);

  if (offenseSet === "twinsLeft") {
    wr1 = makePlayer("WR1", "WR", -18.5, los - 0.3, "#4aa3ff", 1.0);
    wr2 = makePlayer("WR2", "WR", -11.5, los - 0.3, "#4aa3ff", 1.0);
  } else if (offenseSet === "twinsRight") {
    wr1 = makePlayer("WR1", "WR", 11.5, los - 0.3, "#4aa3ff", 1.0);
    wr2 = makePlayer("WR2", "WR", 18.5, los - 0.3, "#4aa3ff", 1.0);
  } else {
    wr1 = makePlayer("WR1", "WR", -17.5, los - 0.3, "#4aa3ff", 1.0);
    wr2 = makePlayer("WR2", "WR", 17.5, los - 0.3, "#4aa3ff", 1.0);
  }

  rusher = makePlayer("R", "RUSH", 2.6, los + 2.4, "#ff9f1c", 1.2);
  cb1 = makePlayer("CB1", "CB", wr1.fx, wr1.fy + 2.2, "#ff9f1c", 1.0);
  cb2 = makePlayer("CB2", "CB", wr2.fx, wr2.fy + 2.2, "#ff9f1c", 1.0);
  safety = makePlayer("FS", "S", 0, los + 12.5, "#ff9f1c", 1.05);
  lb = makePlayer("LB", "LB", 0, los + 5.5, "#ff9f1c", 1.2);

  if (defenseShell === "twoHigh") {
    safety.fx = -6;
    safety.fy = los + 11.8;

    lb.role = "S2";
    lb.name = "SS";
    lb.radius = 1.05;
    lb.fx = 6;
    lb.fy = los + 11.8;

    defense = [rusher, cb1, cb2, safety, lb];
  } else {
    defense = [lb, rusher, cb1, cb2, safety];
  }

  offense = [qb, rb, wr1, wr2, ol];

  ballCarrier = null;
  currentThrow = null;
  pendingTarget = null;
  playFrames = 0;
  runReadFrames = 0;
  qbPastLOS = false;
  runForceFrames = 0;
  runHasCrossedLOS = false;

  assignPlayRoutes();
  updateHud();
}

function assignPlayRoutes() {
  if (!game.selectedPlay) return;

  if (game.selectedPlay === "run") {
    switch (game.selectedVariant) {
      case "inside":
        rb.routeKind = "runInside";
        wr1.routeKind = "stalkInsideL";
        wr2.routeKind = "stalkInsideR";
        break;
      case "offTackle":
        rb.routeKind = "runOffTackle";
        wr1.routeKind = "sealLeft";
        wr2.routeKind = "stalkInsideR";
        break;
      case "sweep":
        rb.routeKind = "runSweep";
        wr1.routeKind = "stalkOutsideL";
        wr2.routeKind = "crack";
        break;
      case "counter":
        rb.routeKind = "runCounter";
        wr1.routeKind = "sealLeft";
        wr2.routeKind = "crack";
        break;
      case "dart":
        rb.routeKind = "runDart";
        wr1.routeKind = "stalkInsideL";
        wr2.routeKind = "stalkInsideR";
        break;
      case "stretch":
        rb.routeKind = "runStretch";
        wr1.routeKind = "stalkOutsideL";
        wr2.routeKind = "stalkInsideR";
        break;
      case "draw":
        rb.routeKind = "runDraw";
        wr1.routeKind = "stalkInsideL";
        wr2.routeKind = "stalkInsideR";
        break;
    }
  }

  if (game.selectedPlay === "short") {
    switch (game.selectedVariant) {
      case "slantPost":
        wr1.routeKind = "slantInsideLeft";
        wr2.routeKind = "mediumPostRight";
        break;
      case "slantCross":
        wr1.routeKind = "slantInsideLeft";
        wr2.routeKind = "crossInsideRight";
        break;
      case "curlSit":
        wr1.routeKind = "curlMiddleLeft";
        wr2.routeKind = "sitMiddleRight";
        break;
      case "doubleIn":
        wr1.routeKind = "inLeft";
        wr2.routeKind = "inRight";
        break;
      case "postFlat":
        wr1.routeKind = "mediumPostLeft";
        wr2.routeKind = "flatRight";
        break;
      case "digSlant":
        wr1.routeKind = "digLeft";
        wr2.routeKind = "slantInsideRight";
        break;
      case "stick":
        wr1.routeKind = "stickLeft";
        wr2.routeKind = "quickOutRight";
        break;
    }
  }

  if (game.selectedPlay === "long") {
    switch (game.selectedVariant) {
      case "goPost":
        wr1.routeKind = "goBendLeft";
        wr2.routeKind = "postInsideRight";
        break;
      case "postCross":
        wr1.routeKind = "postInsideLeft";
        wr2.routeKind = "deepCrossRight";
        break;
      case "streakBend":
        wr1.routeKind = "streakBendLeft";
        wr2.routeKind = "streakBendRight";
        break;
      case "doublePost":
        wr1.routeKind = "postInsideLeft";
        wr2.routeKind = "postInsideRight";
        break;
      case "deepCrossGo":
        wr1.routeKind = "deepCrossLeft";
        wr2.routeKind = "goBendRight";
        break;
      case "cornerPost":
        wr1.routeKind = "cornerLeft";
        wr2.routeKind = "postInsideRight";
        break;
      case "seamOver":
        wr1.routeKind = "seamLeft";
        wr2.routeKind = "overRight";
        break;
    }
  }

  wr1.routeStep = 0;
  wr2.routeStep = 0;
  wr1.assignment = "neutral";
  wr2.assignment = "neutral";
  wr1.isOpen = false;
  wr2.isOpen = false;
  wr1.blockTarget = null;
  wr2.blockTarget = null;
}

function selectPlay(play) {
  game.selectedPlay = play;
  game.selectedVariant = choice(PLAY_VARIANTS[play]);
  offenseSet = chooseOffenseSet();
  defenseShell = chooseDefenseShell();

  if (play === "run") {
    rbAlignment = choice(["leftOffset", "rightOffset", "deep"]);
  } else {
    rbAlignment = choice(["leftOffset", "rightOffset", "pistol"]);
  }

  game.playStarted = false;
  playBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.play === play));
  buildFormation();
}

playBtns.forEach(btn => {
  btn.addEventListener("click", () => selectPlay(btn.dataset.play));
});

snapBtn.addEventListener("click", snapBall);

function chooseCoverage() {
  const toGo = Math.max(0, game.firstDownTarget - game.ballYards);
  const isThirdAndLong = game.down === 3 && toGo >= 8;
  const isThirdAndShort = game.down === 3 && toGo <= 3;
  const isPassingLook = game.selectedPlay === "long" || (game.selectedPlay === "short" && toGo >= 6);
  const nearGoal = game.ballYards >= 35;
  const bias = getTendencyBias();

  const roll = Math.random();

  if (defenseShell === "twoHigh") {
    let cover2Weight = 0.28;
    let cover3Weight = 0.22;
    let zoneWeight = 0.20;
    let cover1Weight = 0.18;
    let blitzWeight = 0.12;

    if (isThirdAndLong) {
      cover3Weight += 0.12;
      cover2Weight += 0.10;
      blitzWeight -= 0.04;
      cover1Weight -= 0.05;
    }

    if (isThirdAndShort) {
      cover1Weight += 0.07;
      blitzWeight += 0.08;
      cover3Weight -= 0.05;
      zoneWeight -= 0.04;
    }

    if (bias.longRate > 0.48) {
      cover2Weight += 0.12;
      cover3Weight += 0.12;
      blitzWeight -= 0.05;
      cover1Weight -= 0.07;
    }

    if (bias.shortRate > 0.48) {
      zoneWeight += 0.08;
      blitzWeight += 0.06;
      cover1Weight += 0.04;
      cover3Weight -= 0.05;
    }

    if (bias.runRate > 0.55) {
      cover1Weight += 0.10;
      blitzWeight += 0.08;
      cover2Weight -= 0.08;
      cover3Weight -= 0.05;
    }

    const total = cover1Weight + cover2Weight + cover3Weight + zoneWeight + blitzWeight;
    let r = roll * total;

    if ((r -= cover2Weight) < 0) return "cover2";
    if ((r -= cover3Weight) < 0) return "cover3";
    if ((r -= zoneWeight) < 0) return "zone";
    if ((r -= cover1Weight) < 0) return "cover1";
    return "blitz";
  }

  let cover1Weight = 0.30;
  let cover2Weight = 0.21;
  let cover3Weight = 0.18;
  let blitzWeight = 0.11;
  let zoneWeight = 0.20;

  if (isThirdAndLong) {
    cover3Weight += 0.14;
    cover2Weight += 0.10;
    blitzWeight -= 0.03;
    cover1Weight -= 0.05;
  }

  if (isThirdAndShort) {
    cover1Weight += 0.12;
    blitzWeight += 0.10;
    cover3Weight -= 0.07;
    zoneWeight -= 0.04;
  }

  if (isPassingLook) {
    cover2Weight += 0.05;
    cover3Weight += 0.04;
  }

  if (nearGoal) {
    cover1Weight += 0.04;
    blitzWeight += 0.03;
  }

  if (bias.longRate > 0.48) {
    cover2Weight += 0.12;
    cover3Weight += 0.14;
    cover1Weight -= 0.06;
    blitzWeight -= 0.03;
  }

  if (bias.shortRate > 0.48) {
    zoneWeight += 0.08;
    blitzWeight += 0.06;
    cover1Weight += 0.05;
    cover3Weight -= 0.05;
  }

  if (bias.runRate > 0.55) {
    cover1Weight += 0.14;
    blitzWeight += 0.10;
    cover2Weight -= 0.08;
    cover3Weight -= 0.07;
  }

  const total = cover1Weight + cover2Weight + cover3Weight + blitzWeight + zoneWeight;
  let r = roll * total;

  if ((r -= cover1Weight) < 0) return "cover1";
  if ((r -= cover2Weight) < 0) return "cover2";
  if ((r -= cover3Weight) < 0) return "cover3";
  if ((r -= blitzWeight) < 0) return "blitz";
  return "zone";
}

function snapBall() {
  if (!game.selectedPlay || game.playStarted || resetTimer > 0) return;

  recordPlayTendency();

  game.playStarted = true;
  playFrames = 0;
  currentThrow = null;
  pendingTarget = null;
  qbPastLOS = false;
  runReadFrames = 0;
  runForceFrames = game.selectedPlay === "run" ? 50 : 0;
  runHasCrossedLOS = false;

  ballCarrier = game.selectedPlay === "run" ? rb : qb;

  coverageType = chooseCoverage();
  passRushMove = choice(["inside", "outside", "bull"]);
  blitzSide = Math.random() < 0.5 ? "left" : "right";
  cb1.style = Math.random() < 0.5 ? "press" : "off";
  cb2.style = Math.random() < 0.5 ? "press" : "off";
  lb.style = defenseShell === "twoHigh"
    ? (Math.random() < 0.5 ? "aggressive" : "deep")
    : (Math.random() < 0.5 ? "runFirst" : "passDrop");

  rollSeparation();
  assignRunBlockTargets();
  updateHud();
}

function assignRunBlockTargets() {
  if (game.selectedPlay !== "run") return;

  wr1.blockTarget = cb1;
  wr2.blockTarget = cb2;

  const support = getSupportDefender();

  if (game.selectedVariant === "inside" || game.selectedVariant === "dart" || game.selectedVariant === "draw") {
    wr1.blockTarget = support;
    wr2.blockTarget = cb2;
  }

  if (game.selectedVariant === "sweep") {
    wr1.blockTarget = cb1;
    wr2.blockTarget = safety;
  }

  if (game.selectedVariant === "stretch") {
    wr1.blockTarget = cb1;
    wr2.blockTarget = cb2;
  }

  if (game.selectedVariant === "counter") {
    wr1.blockTarget = support;
    wr2.blockTarget = safety;
  }
}

function rollSeparation() {
  const matchups = [[wr1, cb1], [wr2, cb2]];
  for (const [wr, db] of matchups) {
    let wrScore = 65 + (Math.random() * 18 - 9);
    let dbScore = 64 + (Math.random() * 18 - 9);

    if ([
      "goBendLeft","goBendRight","postInsideRight","postInsideLeft","deepCrossRight",
      "deepCrossLeft","streakBendLeft","streakBendRight","cornerLeft","seamLeft","overRight"
    ].includes(wr.routeKind)) wrScore += 2.5;

    if ([
      "slantInsideLeft","slantInsideRight","crossInsideRight","curlMiddleLeft","sitMiddleRight",
      "inLeft","inRight","mediumPostRight","mediumPostLeft","flatRight","digLeft","stickLeft","quickOutRight"
    ].includes(wr.routeKind)) wrScore += 3.5;

    const diff = wrScore - dbScore;
    wr.assignment = diff > 6 ? "win" : diff < -6 ? "lose" : "neutral";
  }
}

function getRunDefenseProfile(runKind) {
  const outsideRun = ["runSweep", "runStretch"].includes(runKind);
  const bias = getTendencyBias();

  let profile;

  if (coverageType === "blitz") {
    profile = outsideRun
      ? { rbPush: 0.97, rbCut: 1.06, readDelay: 24, pursuitBoost: 1.05, safetyFill: 1.12 }
      : { rbPush: 0.88, rbCut: 0.88, readDelay: 24, pursuitBoost: 1.18, safetyFill: 1.15 };
  } else if (coverageType === "cover1") {
    profile = outsideRun
      ? { rbPush: 0.92, rbCut: 1.04, readDelay: 28, pursuitBoost: 1.03, safetyFill: 1.08 }
      : { rbPush: 0.92, rbCut: 0.92, readDelay: 28, pursuitBoost: 1.10, safetyFill: 1.08 };
  } else if (coverageType === "cover2") {
    profile = { rbPush: 1.00, rbCut: 1.00, readDelay: 34, pursuitBoost: 1.00, safetyFill: 1.00 };
  } else if (coverageType === "cover3") {
    profile = outsideRun
      ? { rbPush: 1.10, rbCut: 1.12, readDelay: 42, pursuitBoost: 0.90, safetyFill: 0.90 }
      : { rbPush: 1.06, rbCut: 1.05, readDelay: 42, pursuitBoost: 0.92, safetyFill: 0.92 };
  } else {
    profile = outsideRun
      ? { rbPush: 1.08, rbCut: 1.10, readDelay: 40, pursuitBoost: 0.93, safetyFill: 0.94 }
      : { rbPush: 1.04, rbCut: 1.03, readDelay: 40, pursuitBoost: 0.95, safetyFill: 0.95 };
  }

  if (defenseShell === "twoHigh") {
    profile.rbPush *= 1.03;
    profile.rbCut *= 1.03;
    profile.readDelay += 2;
    profile.pursuitBoost *= 0.97;
  }

  if (bias.runRate > 0.58) {
    profile.rbPush *= 0.93;
    profile.rbCut *= 0.94;
    profile.readDelay = Math.max(20, profile.readDelay - 5);
    profile.pursuitBoost *= 1.07;
    profile.safetyFill *= 1.05;
  }

  if (!outsideRun && bias.insideRunRate > 0.58 && bias.runRate > 0.42) {
    profile.rbPush *= 0.92;
    profile.rbCut *= 0.93;
    profile.pursuitBoost *= 1.08;
  }

  if (outsideRun && bias.outsideRunRate > 0.58 && bias.runRate > 0.42) {
    profile.rbPush *= 0.94;
    profile.rbCut *= 0.95;
    profile.safetyFill *= 1.08;
  }

  return profile;
}

canvas.addEventListener("pointerdown", (e) => {
  holdStart = performance.now();
  if (!game.playStarted || resetTimer > 0) return;

  const tapped = getTappedReceiver(e.clientX, e.clientY);
  if (tapped && ballCarrier === qb) pendingTarget = tapped;
});

canvas.addEventListener("pointerup", () => {
  if (!pendingTarget) return;
  const held = performance.now() - holdStart > 180;
  startThrow(pendingTarget, held);
  pendingTarget = null;
});

function getTappedReceiver(clientX, clientY) {
  for (const p of [wr1, wr2, rb]) {
    const pr = projectFieldPoint(p.fx, p.fy);
    if (Math.hypot(clientX - pr.x, clientY - pr.y) < 52) return p;
  }
  return null;
}

function startThrow(target, isBullet) {
  if (!game.playStarted) return;
  if (ballCarrier !== qb) return;
  if (currentThrow) return;
  if (qbPastLOS) return;

  const throwDistance = Math.hypot(target.fx - qb.fx, target.fy - qb.fy);

  let speed;
  if (isBullet) {
    speed = 0.078 - throwDistance * 0.0032;
    speed = Math.max(0.038, Math.min(0.078, speed));
  } else {
    speed = 0.056 - throwDistance * 0.0034;
    speed = Math.max(0.024, Math.min(0.056, speed));
  }

  currentThrow = {
    fx: qb.fx,
    fy: qb.fy,
    h: 0,
    prevFx: qb.fx,
    prevFy: qb.fy,
    prevH: 0,
    target,
    progress: 0,
    speed,
    bullet: isBullet,
    distance: throwDistance
  };
}

joystick.addEventListener("pointerdown", handleJoy);
joystick.addEventListener("pointermove", handleJoy);
joystick.addEventListener("pointerup", resetJoy);
joystick.addEventListener("pointercancel", resetJoy);
joystick.addEventListener("pointerleave", resetJoy);

function handleJoy(e) {
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = e.clientX - cx;
  let dy = e.clientY - cy;
  const mag = Math.hypot(dx, dy);
  const max = 35;

  if (mag > max) {
    dx = dx / mag * max;
    dy = dy / mag * max;
  }

  joy.x = dx / max;
  joy.y = dy / max;

  stick.style.left = `${35 + dx - 25}px`;
  stick.style.top = `${35 + dy - 25}px`;
}

function resetJoy() {
  joy.x = 0;
  joy.y = 0;
  stick.style.left = "35px";
  stick.style.top = "35px";
}

function moveBallCarrier() {
  if (!ballCarrier) return;

  const tempo = getTempoScale();

  if (ballCarrier === qb) {
    const qbIsRunner = qbPastLOS;

    if (!qbIsRunner) {
      const lateral = 0.23 * tempo;
      const forward = 0.18 * tempo;
      const backward = 0.14 * tempo;

      ballCarrier.fx += joy.x * lateral;
      if (joy.y < 0) ballCarrier.fy += (-joy.y) * forward;
      else ballCarrier.fy -= joy.y * backward;

      ballCarrier.fy = Math.max(
        game.lineOfScrimmage - 16.5,
        Math.min(game.lineOfScrimmage + 4.5, ballCarrier.fy)
      );

      clampFieldX(ballCarrier, 1.5);
      clampDepth(ballCarrier);

      qbPastLOS = ballCarrier.fy > game.lineOfScrimmage;

      if (rbAlignment === "leftOffset") {
        rb.fx = qb.fx - 4.5;
        rb.fy = qb.fy - 2.2;
      } else if (rbAlignment === "rightOffset") {
        rb.fx = qb.fx + 4.5;
        rb.fy = qb.fy - 2.2;
      } else if (rbAlignment === "deep") {
        rb.fx = qb.fx;
        rb.fy = qb.fy - 3.8;
      } else {
        rb.fx = qb.fx;
        rb.fy = qb.fy - 2.8;
      }

      ol.fy += ((game.lineOfScrimmage + 0.2) - ol.fy) * 0.18;

      clampFieldX(rb, 1.0);
      clampFieldX(ol, 1.0);
      clampDepth(rb);
      clampDepth(ol);
      return;
    }

    const lateral = 0.18 * tempo;
    const forward = 0.16 * tempo;
    const backward = 0.11 * tempo;

    ballCarrier.fx += joy.x * lateral;
    if (joy.y < 0) ballCarrier.fy += (-joy.y) * forward;
    else ballCarrier.fy -= joy.y * backward;

    clampFieldX(ballCarrier, 1.0);
    clampDepth(ballCarrier);
    return;
  }

  if (ballCarrier === rb) {
    const pastLOS = ballCarrier.fy > game.lineOfScrimmage;

    const lateral = (pastLOS ? 0.22 : 0.23) * tempo;
    const forward = (pastLOS ? 0.19 : 0.21) * tempo;
    const backward = 0.13 * tempo;

    ballCarrier.fx += joy.x * lateral;
    if (joy.y < 0) ballCarrier.fy += (-joy.y) * forward;
    else ballCarrier.fy -= joy.y * backward;

    clampFieldX(ballCarrier, 1.0);
    clampDepth(ballCarrier);
    return;
  }

  const lateral = 0.20 * tempo;
  const forward = 0.18 * tempo;
  const backward = 0.13 * tempo;

  ballCarrier.fx += joy.x * lateral;
  if (joy.y < 0) ballCarrier.fy += (-joy.y) * forward;
  else ballCarrier.fy -= joy.y * backward;

  clampFieldX(ballCarrier, 1.0);
  clampDepth(ballCarrier);
}

function update() {
  if (playResultTimer > 0) playResultTimer--;

  if (resetTimer > 0) {
    resetTimer--;
    if (resetTimer <= 0) {
      game.playStarted = false;
      currentThrow = null;
      buildFormation();
      updateHud();
    }
    return;
  }

  if (!offense.length || !game.playStarted) return;

  playFrames++;

  if (game.selectedPlay === "run") updateRunPlay();
  else updatePassPlay();

  updateDefense();
  updateThrow();
  checkTackle();
  checkTouchdown();
}

function updateRunReceiverBlock(wr, target, leverage = 1) {
  if (!target) return;

  const tempo = getTempoScale();
  const dist = Math.hypot(target.fx - wr.fx, target.fy - wr.fy);
  const targetIsSafety = target.role === "S" || target.role === "S2";

  const closeRate = targetIsSafety ? 0.08 : 0.11;
  const engageRate = targetIsSafety ? 0.09 : 0.13;
  const steerRate = targetIsSafety ? 0.04 : 0.08;

  if (dist > 2.0) {
    wr.fx += (target.fx - wr.fx) * closeRate * tempo;
    wr.fy += ((target.fy - 0.4) - wr.fy) * closeRate * tempo;
  } else {
    wr.fx += (target.fx - leverage * (targetIsSafety ? 0.35 : 0.6) - wr.fx) * engageRate * tempo;
    wr.fy += ((target.fy - 0.5) - wr.fy) * engageRate * tempo;

    target.fx += (wr.fx + leverage * (targetIsSafety ? 0.35 : 0.9) - target.fx) * steerRate * tempo;
    target.fy += ((wr.fy + (targetIsSafety ? 0.2 : 0.6)) - target.fy) * steerRate * tempo;
  }

  clampFieldX(wr, 1.0);
  clampFieldX(target, 1.0);
  clampDepth(wr);
  clampDepth(target);
}

function updateRunPlay() {
  if (ballCarrier !== rb) ballCarrier = rb;

  const tempo = getTempoScale();
  const los = game.lineOfScrimmage;
  const runProfile = getRunDefenseProfile(rb.routeKind);

  runReadFrames++;
  moveBallCarrier();

  if (!runHasCrossedLOS) {
    let push = 0.15 * tempo * runProfile.rbPush;
    if (rb.routeKind === "runDraw") push = 0.075 * tempo * runProfile.rbPush;

    rb.fy += push;

    if (rbAlignment === "leftOffset") rb.fx += 0.01 * tempo;
    if (rbAlignment === "rightOffset") rb.fx -= 0.01 * tempo;

    switch (rb.routeKind) {
      case "runOffTackle":
        rb.fx += (rbAlignment === "leftOffset" ? -0.05 : 0.06) * tempo * runProfile.rbCut;
        break;
      case "runSweep":
        rb.fx += (rbAlignment === "leftOffset" ? -0.09 : 0.10) * tempo * runProfile.rbCut;
        break;
      case "runCounter":
        rb.fx -= 0.05 * tempo * runProfile.rbCut;
        break;
      case "runStretch":
        rb.fx += (rbAlignment === "leftOffset" ? -0.08 : 0.10) * tempo * runProfile.rbCut;
        break;
      case "runDart":
        rb.fx += 0.03 * tempo * runProfile.rbCut;
        break;
    }

    if (rb.fy >= los + 0.8) runHasCrossedLOS = true;
  } else {
    switch (rb.routeKind) {
      case "runOffTackle":
        rb.fx += (rbAlignment === "leftOffset" ? -0.06 : 0.07) * tempo * runProfile.rbCut;
        break;
      case "runSweep":
        rb.fx += (rbAlignment === "leftOffset" ? -0.10 : 0.10) * tempo * runProfile.rbCut;
        break;
      case "runCounter":
        rb.fx -= 0.08 * tempo * runProfile.rbCut;
        break;
      case "runStretch":
        rb.fx += (rbAlignment === "leftOffset" ? -0.08 : 0.08) * tempo * runProfile.rbCut;
        break;
      case "runDart":
        rb.fx += 0.03 * tempo * runProfile.rbCut;
        break;
    }
  }

  if (runForceFrames > 0) runForceFrames--;

  updateRunReceiverBlock(wr1, wr1.blockTarget, -1);
  updateRunReceiverBlock(wr2, wr2.blockTarget, 1);

  ol.fx += (rb.fx - ol.fx) * 0.12;
  ol.fy += ((rb.fy + 1.2) - ol.fy) * 0.12;

  clampFieldX(rb, 1.0);
  clampFieldX(wr1, 1.0);
  clampFieldX(wr2, 1.0);
  clampFieldX(ol, 1.0);

  clampDepth(rb);
  clampDepth(wr1);
  clampDepth(wr2);
  clampDepth(ol);
}

function updatePassPlay() {
  moveBallCarrier();

  if (ballCarrier !== wr1) updateRoute(wr1, cb1);
  if (ballCarrier !== wr2) updateRoute(wr2, cb2);

  if (ballCarrier !== rb) {
    if (rbAlignment === "leftOffset") {
      rb.fx = qb.fx - 4.5;
      rb.fy = qb.fy - 2.2;
    } else if (rbAlignment === "rightOffset") {
      rb.fx = qb.fx + 4.5;
      rb.fy = qb.fy - 2.2;
    } else if (rbAlignment === "deep") {
      rb.fx = qb.fx;
      rb.fy = qb.fy - 3.8;
    } else {
      rb.fx = qb.fx;
      rb.fy = qb.fy - 2.8;
    }

    clampFieldX(rb, 1.0);
    clampDepth(rb);
  }

  if (ballCarrier === qb && !qbPastLOS) updatePassProtection();
  else {
    rusher.engaged = false;
    ol.engaged = false;
  }
}

function updateRoute(wr, db) {
  wr.routeStep++;

  let speedFy = 0.22;
  let speedFx = 0;

  if (wr.assignment === "win") speedFy *= 1.06;
  else if (wr.assignment === "lose") speedFy *= 0.95;

  switch (wr.routeKind) {
    case "slantInsideLeft":
      if (wr.routeStep < 16) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.09; speedFx = offenseSet === "twinsLeft" ? 0.12 : 0.15; }
      break;
    case "slantInsideRight":
      if (wr.routeStep < 16) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.09; speedFx = offenseSet === "twinsRight" ? -0.12 : -0.15; }
      break;
    case "crossInsideRight":
      if (wr.routeStep < 16) { speedFy = 0.15; speedFx = 0; }
      else { speedFy = 0.09; speedFx = -0.18; }
      break;
    case "curlMiddleLeft":
      if (wr.routeStep < 18) { speedFy = 0.18; speedFx = 0.01; }
      else { speedFy = -0.04; speedFx = 0.05; }
      break;
    case "sitMiddleRight":
      if (wr.routeStep < 14) { speedFy = 0.13; speedFx = -0.04; }
      else { speedFy = 0.01; speedFx = -0.02; }
      break;
    case "inLeft":
      if (wr.routeStep < 16) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.08; speedFx = 0.16; }
      break;
    case "inRight":
      if (wr.routeStep < 16) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.08; speedFx = -0.16; }
      break;
    case "mediumPostRight":
      if (wr.routeStep < 18) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = -0.10; }
      break;
    case "mediumPostLeft":
      if (wr.routeStep < 18) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = 0.10; }
      break;
    case "flatRight":
      speedFy = 0.05; speedFx = -0.14;
      break;
    case "digLeft":
      if (wr.routeStep < 20) { speedFy = 0.16; speedFx = 0; }
      else { speedFy = 0.05; speedFx = 0.18; }
      break;
    case "stickLeft":
      if (wr.routeStep < 12) { speedFy = 0.11; speedFx = 0.02; }
      else { speedFy = -0.02; speedFx = 0.03; }
      break;
    case "quickOutRight":
      if (wr.routeStep < 10) { speedFy = 0.09; speedFx = 0; }
      else { speedFy = 0.02; speedFx = -0.15; }
      break;
    case "goBendLeft":
      if (wr.routeStep < 22) { speedFy = 0.18; speedFx = 0.01; }
      else { speedFy = 0.19; speedFx = 0.03; }
      break;
    case "goBendRight":
      if (wr.routeStep < 22) { speedFy = 0.18; speedFx = -0.01; }
      else { speedFy = 0.19; speedFx = -0.03; }
      break;
    case "postInsideRight":
      if (wr.routeStep < 24) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = -0.14; }
      break;
    case "postInsideLeft":
      if (wr.routeStep < 24) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = 0.14; }
      break;
    case "deepCrossRight":
      if (wr.routeStep < 20) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = -0.18; }
      break;
    case "deepCrossLeft":
      if (wr.routeStep < 20) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.10; speedFx = 0.18; }
      break;
    case "streakBendLeft":
      if (wr.routeStep < 20) { speedFy = 0.18; speedFx = 0.01; }
      else { speedFy = 0.18; speedFx = 0.02; }
      break;
    case "streakBendRight":
      if (wr.routeStep < 20) { speedFy = 0.18; speedFx = -0.01; }
      else { speedFy = 0.18; speedFx = -0.02; }
      break;
    case "cornerLeft":
      if (wr.routeStep < 22) { speedFy = 0.17; speedFx = 0; }
      else { speedFy = 0.09; speedFx = -0.14; }
      break;
    case "seamLeft":
      speedFy = 0.18; speedFx = 0.005;
      break;
    case "overRight":
      if (wr.routeStep < 18) { speedFy = 0.15; speedFx = 0; }
      else { speedFy = 0.09; speedFx = -0.15; }
      break;
  }

  const tempo = getTempoScale();
  speedFy *= tempo;
  speedFx *= tempo;

  wr.fx += speedFx;
  wr.fy += speedFy;

  const insideMargin = 4.0;
  wr.fx = Math.max(-FIELD.widthHalf + insideMargin, Math.min(FIELD.widthHalf - insideMargin, wr.fx));
  clampFieldX(wr, 1.0);
  clampDepth(wr);

  const verticalRoute = [
    "goBendLeft","goBendRight","postInsideRight","postInsideLeft","deepCrossRight",
    "deepCrossLeft","streakBendLeft","streakBendRight","cornerLeft","seamLeft","overRight",
    "mediumPostRight","mediumPostLeft"
  ].includes(wr.routeKind);

  let followStrength =
    wr.assignment === "win" ? 0.042 :
    wr.assignment === "lose" ? 0.080 :
    0.058;

  if (verticalRoute) followStrength += 0.012;

  if (coverageType === "cover1") {
    db.fx += (wr.fx - db.fx) * followStrength;
    db.fy += ((wr.fy - (verticalRoute ? 0.6 : 1.2)) - db.fy) * (followStrength + (verticalRoute ? 0.006 : 0));
  } else if (coverageType === "zone") {
    const receiverIsVertical = wr.fy > game.lineOfScrimmage + 7;
    const zoneY = receiverIsVertical ? game.lineOfScrimmage + 8.5 : game.lineOfScrimmage + 6;
    const zoneX = wr === wr1 ? Math.min(-5, wr.fx * 0.62) : Math.max(5, wr.fx * 0.62);

    db.fx += (zoneX - db.fx) * 0.035;
    db.fy += (zoneY - db.fy) * 0.035;
  } else if (coverageType === "cover2") {
    const outsideHalfX = wr === wr1 ? -12 : 12;
    const deepHalfY = wr.fy > game.lineOfScrimmage + 6 ? wr.fy + 1.8 : game.lineOfScrimmage + 9;

    db.fx += ((outsideHalfX + wr.fx * 0.22) - db.fx) * 0.040;
    db.fy += (deepHalfY - db.fy) * 0.040;
  } else if (coverageType === "cover3") {
    const deepThirdX = wr === wr1 ? -14 : 14;
    const deepThirdY = wr.fy > game.lineOfScrimmage + 5 ? wr.fy + 2.8 : game.lineOfScrimmage + 10.5;

    db.fx += ((deepThirdX + wr.fx * 0.15) - db.fx) * 0.042;
    db.fy += (deepThirdY - db.fy) * 0.042;
  } else if (coverageType === "blitz") {
    const blitzingThisDB = (db === cb1 && blitzSide === "left") || (db === cb2 && blitzSide === "right");
    if (!blitzingThisDB) {
      db.fx += (wr.fx - db.fx) * 0.050;
      db.fy += ((wr.fy - 0.7) - db.fy) * 0.052;
    }
  }

  clampFieldX(db, 1.0);
  clampDepth(db);
  wr.isOpen = Math.hypot(wr.fx - db.fx, wr.fy - db.fy) > (verticalRoute ? 2.4 : 2.0);
}

function finishPlayAtSpot(resultText = "TACKLED") {
  const gained = Math.round(ballCarrier.fy - game.lineOfScrimmage);
  game.ballYards = Math.max(0, game.lineOfScrimmage + gained);
  game.lineOfScrimmage = game.ballYards;

  if (game.ballYards >= FIELD.goalLine) {
    resetDrive("TOUCHDOWN!");
    return;
  }

  if (game.ballYards >= game.firstDownTarget) {
    game.down = 1;
    game.firstDownTarget = Math.min(game.ballYards + FIELD.firstDownDistance, FIELD.goalLine);
    showPlayResult("FIRST DOWN");
  } else {
    game.down += 1;
    if (game.down > 3) {
      resetDrive("TURNOVER ON DOWNS");
    } else {
      showPlayResult(resultText);
    }
  }
}

function updatePassProtection() {
  const tempo = getTempoScale();
  const bias = getTendencyBias();

  const pocketTargetX = qb.fx * 0.46;
  const pocketTargetY = game.lineOfScrimmage + 0.15;

  ol.fx += (pocketTargetX - ol.fx) * 0.095 * tempo;
  ol.fy += (pocketTargetY - ol.fy) * 0.095 * tempo;

  const distToOL = Math.hypot(rusher.fx - ol.fx, rusher.fy - ol.fy);
  const qbDrift = qb.fx - ol.fx;

  if (!rusher.engaged && distToOL < 1.85) {
    rusher.engaged = true;
    ol.engaged = true;
    rusher.blockTimer = 28 + Math.random() * 14;
  }

  if (rusher.engaged) {
    rusher.blockTimer--;

    let leverageX = ol.fx;
    if (passRushMove === "outside") leverageX = ol.fx + Math.sign(qbDrift || 1) * 0.8;
    if (passRushMove === "inside") leverageX = ol.fx - Math.sign(qbDrift || 1) * 0.25;
    if (passRushMove === "bull") leverageX = ol.fx;

    ol.fx += (leverageX - ol.fx) * 0.065 * tempo;

    rusher.fx += ((ol.fx + (passRushMove === "outside" ? 0.10 : 0)) - rusher.fx) * 0.085 * tempo;
    rusher.fy += ((ol.fy - 0.38) - rusher.fy) * 0.090 * tempo;

    if (passRushMove === "outside" && Math.abs(qbDrift) > 2.0) {
      rusher.fx += (qb.fx - rusher.fx) * 0.032 * tempo;
      rusher.fy += ((qb.fy - 0.40) - rusher.fy) * 0.024 * tempo;
      rusher.blockTimer -= 1.4;
    }

    if (passRushMove === "inside") {
      rusher.fy -= 0.012 * tempo;
      rusher.blockTimer -= 0.45;
    }

    if (passRushMove === "bull") {
      rusher.fy -= 0.026 * tempo;
      ol.fy -= 0.010 * tempo;
      rusher.blockTimer -= 0.8;
    }

    let shedChance = 0.024;
    if (passRushMove === "outside") shedChance = 0.032;
    if (passRushMove === "inside") shedChance = 0.028;
    if (passRushMove === "bull") shedChance = 0.036;
    if (Math.abs(qbDrift) > 3.0) shedChance += 0.020;
    if (bias.longRate > 0.48) shedChance += 0.010;

    if (Math.random() < shedChance || rusher.blockTimer <= 0) {
      rusher.engaged = false;
      ol.engaged = false;
    }
  } else {
    const laneBias = Math.max(-3.4, Math.min(3.4, qb.fx * 0.82));
    const targetX = qb.fx + laneBias;
    const targetY = qb.fy - 0.45;

    rusher.fx += (targetX - rusher.fx) * 0.056 * tempo;
    rusher.fy += (targetY - rusher.fy) * 0.050 * tempo;

    ol.fx += ((rusher.fx - Math.sign(rusher.fx - qb.fx) * 0.35) - ol.fx) * 0.018 * tempo;
  }

  const support = getSupportDefender();
  if (support && (coverageType === "blitz" || coverageType === "cover1" || bias.longRate > 0.50)) {
    support.fx += ((qb.fx * 0.55) - support.fx) * 0.010 * tempo;
    support.fy += ((game.lineOfScrimmage + 7.0) - support.fy) * 0.012 * tempo;
  }

  if (Math.hypot(qb.fx - rusher.fx, qb.fy - rusher.fy) < 1.75) {
    ballCarrier = qb;
    ballCarrier.fy = Math.max(0, qb.fy - (4 + Math.random() * 4));
    finishPlayAtSpot("SACK!");
    return;
  }

  if (coverageType === "blitz") {
    const blitzCB = blitzSide === "left" ? cb1 : cb2;
    if (Math.hypot(qb.fx - blitzCB.fx, qb.fy - blitzCB.fy) < 1.82) {
      ballCarrier = qb;
      ballCarrier.fy = Math.max(0, qb.fy - (4 + Math.random() * 3));
      finishPlayAtSpot("BLITZ SACK!");
      return;
    }
  }

  clampFieldX(ol, 1.0);
  clampFieldX(rusher, 1.0);
  clampDepth(ol);
  clampDepth(rusher);
}

function getPursuitTarget(defender, runner) {
  const dx = runner.fx - defender.fx;
  const lateralLead = joy.x * 3.8;
  const verticalLead = defender.fy < runner.fy ? 1.8 : 3.4;
  const angleCut = dx * 0.45;

  return {
    fx: runner.fx + lateralLead + angleCut,
    fy: runner.fy + verticalLead
  };
}

function updateDefense() {
  if (!ballCarrier) return;

  const tempo = getTempoScale();
  const support = getSupportDefender();

  if (ballCarrier === qb && qbPastLOS) {
    for (const d of defense) {
      const target = getPursuitTarget(d, qb);
      d.fx += (target.fx - d.fx) * 0.034 * tempo;
      d.fy += (target.fy - d.fy) * 0.034 * tempo;
      clampFieldX(d, 1.0);
      clampDepth(d);
    }
    return;
  }

  if (game.selectedPlay === "run" && ballCarrier === rb) {
    const runProfile = getRunDefenseProfile(rb.routeKind);
    const readDelay = runProfile.readDelay;

    const cb1Mirror = wr1.blockTarget === cb1 ? 0.010 : 0.020;
    const cb2Mirror = wr2.blockTarget === cb2 ? 0.010 : 0.020;

    cb1.fx += (wr1.fx - cb1.fx) * cb1Mirror * tempo;
    cb1.fy += (wr1.fy - cb1.fy) * cb1Mirror * tempo;

    cb2.fx += (wr2.fx - cb2.fx) * cb2Mirror * tempo;
    cb2.fy += (wr2.fy - cb2.fy) * cb2Mirror * tempo;

    const isWideRun = rb.routeKind === "runSweep" || rb.routeKind === "runStretch";

    const safetyFillDefender = defenseShell === "twoHigh" ? lb : safety;
    const safetyDepthTarget = runHasCrossedLOS
      ? rb.fy + (isWideRun ? 1.0 : 2.0)
      : game.lineOfScrimmage + (isWideRun ? 7.5 : 9.0);

    safetyFillDefender.fx += (rb.fx - safetyFillDefender.fx) * (
      runHasCrossedLOS
        ? (isWideRun ? 0.040 : 0.028) * runProfile.safetyFill
        : (isWideRun ? 0.016 : 0.008) * runProfile.safetyFill
    ) * tempo;

    safetyFillDefender.fy += (safetyDepthTarget - safetyFillDefender.fy) * (
      runHasCrossedLOS
        ? (isWideRun ? 0.042 : 0.030) * runProfile.safetyFill
        : (isWideRun ? 0.016 : 0.010) * runProfile.safetyFill
    ) * tempo;

    if (runReadFrames > readDelay) {
      const rushTarget = getPursuitTarget(rusher, rb);
      const supportTarget = getPursuitTarget(support, rb);
      const cb1Target = getPursuitTarget(cb1, rb);
      const cb2Target = getPursuitTarget(cb2, rb);

      const rushStrength = (runHasCrossedLOS ? 0.040 : 0.014) * runProfile.pursuitBoost;
      const supportStrength = (runHasCrossedLOS ? 0.034 : 0.012) * runProfile.pursuitBoost;

      rusher.fx += (rushTarget.fx - rusher.fx) * rushStrength * tempo;
      rusher.fy += (rushTarget.fy - rusher.fy) * rushStrength * tempo;

      support.fx += (supportTarget.fx - support.fx) * supportStrength * tempo;
      support.fy += (supportTarget.fy - support.fy) * supportStrength * tempo;

      if (Math.abs(rb.fx) > 6 || runHasCrossedLOS) {
        cb1.fx += (cb1Target.fx - cb1.fx) * 0.020 * runProfile.pursuitBoost * tempo;
        cb1.fy += (cb1Target.fy - cb1.fy) * 0.020 * runProfile.pursuitBoost * tempo;

        cb2.fx += (cb2Target.fx - cb2.fx) * 0.020 * runProfile.pursuitBoost * tempo;
        cb2.fy += (cb2Target.fy - cb2.fy) * 0.020 * runProfile.pursuitBoost * tempo;
      }
    }

    if (coverageType === "cover1" || coverageType === "blitz") {
      support.fx += (rb.fx - support.fx) * 0.010 * tempo;
      support.fy += ((rb.fy + 0.8) - support.fy) * 0.010 * tempo;
    }

    for (const d of defense) {
      clampFieldX(d, 1.0);
      clampDepth(d);
    }
    return;
  }

  if (ballCarrier === qb) {
    if (coverageType === "cover1") {
      cb1.fx += (wr1.fx - cb1.fx) * 0.044 * tempo;
      cb1.fy += ((wr1.fy - 0.8) - cb1.fy) * 0.046 * tempo;

      cb2.fx += (wr2.fx - cb2.fx) * 0.044 * tempo;
      cb2.fy += ((wr2.fy - 0.8) - cb2.fy) * 0.046 * tempo;

      if (defenseShell === "twoHigh") {
        safety.fx += (((wr1.fy > wr2.fy ? wr1 : wr2).fx) - safety.fx) * 0.040 * tempo;
        safety.fy += ((Math.max(wr1.fy, wr2.fy) + 4.0) - safety.fy) * 0.044 * tempo;

        lb.fx += (0 - lb.fx) * 0.020 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.5) - lb.fy) * 0.024 * tempo;
      } else {
        lb.fx += (qb.fx - lb.fx) * 0.010 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6) - lb.fy) * 0.012 * tempo;

        const deepestWR = wr1.fy > wr2.fy ? wr1 : wr2;
        safety.fx += (deepestWR.fx - safety.fx) * 0.038 * tempo;
        safety.fy += ((deepestWR.fy + 4.2) - safety.fy) * 0.042 * tempo;
      }
    }

    else if (coverageType === "cover2") {
      cb1.fx += ((-13 + wr1.fx * 0.18) - cb1.fx) * 0.040 * tempo;
      cb1.fy += ((Math.max(game.lineOfScrimmage + 9.5, wr1.fy + 2.1)) - cb1.fy) * 0.040 * tempo;

      cb2.fx += ((13 + wr2.fx * 0.18) - cb2.fx) * 0.040 * tempo;
      cb2.fy += ((Math.max(game.lineOfScrimmage + 9.5, wr2.fy + 2.1)) - cb2.fy) * 0.040 * tempo;

      if (defenseShell === "twoHigh") {
        safety.fx += ((-7 + wr1.fx * 0.22) - safety.fx) * 0.040 * tempo;
        safety.fy += ((Math.max(game.lineOfScrimmage + 12.5, wr1.fy + 3.0)) - safety.fy) * 0.046 * tempo;

        lb.fx += ((7 + wr2.fx * 0.22) - lb.fx) * 0.040 * tempo;
        lb.fy += ((Math.max(game.lineOfScrimmage + 12.5, wr2.fy + 3.0)) - lb.fy) * 0.046 * tempo;
      } else {
        const strongSide = wr2.fy > wr1.fy ? 1 : -1;
        lb.fx += ((strongSide * 7) - lb.fx) * 0.020 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.5) - lb.fy) * 0.020 * tempo;

        const deeperSideWR = wr2.fy > wr1.fy ? wr2 : wr1;
        safety.fx += ((deeperSideWR.fx * 0.55) - safety.fx) * 0.040 * tempo;
        safety.fy += ((Math.max(game.lineOfScrimmage + 12.5, deeperSideWR.fy + 3.5)) - safety.fy) * 0.045 * tempo;
      }
    }

    else if (coverageType === "cover3") {
      cb1.fx += ((-14 + wr1.fx * 0.12) - cb1.fx) * 0.042 * tempo;
      cb1.fy += ((Math.max(game.lineOfScrimmage + 11, wr1.fy + 2.8)) - cb1.fy) * 0.042 * tempo;

      cb2.fx += ((14 + wr2.fx * 0.12) - cb2.fx) * 0.042 * tempo;
      cb2.fy += ((Math.max(game.lineOfScrimmage + 11, wr2.fy + 2.8)) - cb2.fy) * 0.042 * tempo;

      const middleDeepX = ((wr1.fx + wr2.fx) / 2) * 0.45;
      const middleDeepY = Math.max(game.lineOfScrimmage + 13, wr1.fy + 3.5, wr2.fy + 3.5);

      safety.fx += (middleDeepX - safety.fx) * 0.046 * tempo;
      safety.fy += (middleDeepY - safety.fy) * 0.050 * tempo;

      if (defenseShell === "twoHigh") {
        lb.fx += (0 - lb.fx) * 0.018 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.5) - lb.fy) * 0.022 * tempo;
      } else {
        lb.fx += (0 - lb.fx) * 0.018 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.3) - lb.fy) * 0.022 * tempo;
      }
    }

    else if (coverageType === "zone") {
      const receiverIsVertical1 = wr1.fy > game.lineOfScrimmage + 7;
      const zoneY1 = receiverIsVertical1 ? game.lineOfScrimmage + 8.5 : game.lineOfScrimmage + 6;
      const zoneX1 = Math.min(-5, wr1.fx * 0.62);

      cb1.fx += (zoneX1 - cb1.fx) * 0.035 * tempo;
      cb1.fy += (zoneY1 - cb1.fy) * 0.035 * tempo;

      const receiverIsVertical2 = wr2.fy > game.lineOfScrimmage + 7;
      const zoneY2 = receiverIsVertical2 ? game.lineOfScrimmage + 8.5 : game.lineOfScrimmage + 6;
      const zoneX2 = Math.max(5, wr2.fx * 0.62);

      cb2.fx += (zoneX2 - cb2.fx) * 0.035 * tempo;
      cb2.fy += (zoneY2 - cb2.fy) * 0.035 * tempo;

      if (defenseShell === "twoHigh") {
        safety.fx += ((-6 + wr1.fx * 0.16) - safety.fx) * 0.038 * tempo;
        safety.fy += ((Math.max(game.lineOfScrimmage + 12.0, wr1.fy + 3.2)) - safety.fy) * 0.044 * tempo;

        lb.fx += ((6 + wr2.fx * 0.16) - lb.fx) * 0.038 * tempo;
        lb.fy += ((Math.max(game.lineOfScrimmage + 12.0, wr2.fy + 3.2)) - lb.fy) * 0.044 * tempo;
      } else {
        lb.fx += ((wr2.fx > 0 ? 5 : -5) - lb.fx) * 0.016 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.8) - lb.fy) * 0.020 * tempo;

        const wr1Vertical = wr1.fy > game.lineOfScrimmage + 7;
        const wr2Vertical = wr2.fy > game.lineOfScrimmage + 7;
        const wr1DeepThreat = wr1Vertical ? (wr1.fy + Math.abs(wr1.fx) * 0.15) : -999;
        const wr2DeepThreat = wr2Vertical ? (wr2.fy + Math.abs(wr2.fx) * 0.15) : -999;

        let targetX = 0;
        let targetY = game.lineOfScrimmage + 13;

        if (wr1Vertical && wr2Vertical) {
          targetX = (wr1.fx + wr2.fx) / 2;
          targetY = Math.max(wr1.fy, wr2.fy) + 4.5;
        } else if (wr1Vertical || wr2Vertical) {
          const threat = wr1DeepThreat > wr2DeepThreat ? wr1 : wr2;
          targetX = threat.fx * 0.8;
          targetY = threat.fy + 4.0;
        } else {
          const middleX = (wr1.fx + wr2.fx) / 2;
          const deeperY = Math.max(game.lineOfScrimmage + 12, wr1.fy, wr2.fy);
          targetX = middleX * 0.7;
          targetY = deeperY + 2.5;
        }

        const emergencyCarry = wr1.fy > safety.fy - 1.0 || wr2.fy > safety.fy - 1.0;
        const fxRate = emergencyCarry ? 0.060 : 0.045;
        const fyRate = emergencyCarry ? 0.075 : 0.050;

        safety.fx += (targetX - safety.fx) * fxRate * tempo;
        safety.fy += (targetY - safety.fy) * fyRate * tempo;
      }
    }

    else if (coverageType === "blitz") {
      const blitzCB = blitzSide === "left" ? cb1 : cb2;
      const coverCB = blitzSide === "left" ? cb2 : cb1;
      const coverWR = blitzSide === "left" ? wr2 : wr1;

      coverCB.fx += (coverWR.fx - coverCB.fx) * 0.050 * tempo;
      coverCB.fy += ((coverWR.fy - 0.7) - coverCB.fy) * 0.052 * tempo;

      const blitzAngleX = qb.fx + (blitzSide === "left" ? -1.8 : 1.8);
      const blitzAngleY = qb.fy - 0.7;

      blitzCB.fx += (blitzAngleX - blitzCB.fx) * 0.050 * tempo;
      blitzCB.fy += (blitzAngleY - blitzCB.fy) * 0.046 * tempo;

      if (defenseShell === "twoHigh") {
        const nonBlitzSafety = lb;
        const deepSafety = safety;

        nonBlitzSafety.fx += ((blitzSide === "left" ? -4.5 : 4.5) - nonBlitzSafety.fx) * 0.020 * tempo;
        nonBlitzSafety.fy += ((game.lineOfScrimmage + 6.5) - nonBlitzSafety.fy) * 0.024 * tempo;

        deepSafety.fx += ((((wr1.fx + wr2.fx) / 2) * 0.45) - deepSafety.fx) * 0.044 * tempo;
        deepSafety.fy += ((Math.max(game.lineOfScrimmage + 12.5, wr1.fy + 3.2, wr2.fy + 3.2)) - deepSafety.fy) * 0.050 * tempo;
      } else {
        lb.fx += ((blitzSide === "left" ? -5.5 : 5.5) - lb.fx) * 0.020 * tempo;
        lb.fy += ((game.lineOfScrimmage + 6.2) - lb.fy) * 0.020 * tempo;

        const middleDeepX = ((wr1.fx + wr2.fx) / 2) * 0.45;
        const middleDeepY = Math.max(game.lineOfScrimmage + 12.5, wr1.fy + 3.2, wr2.fy + 3.2);

        safety.fx += (middleDeepX - safety.fx) * 0.045 * tempo;
        safety.fy += (middleDeepY - safety.fy) * 0.050 * tempo;
      }

      if (Math.hypot(qb.fx - blitzCB.fx, qb.fy - blitzCB.fy) < 1.95) {
        ballCarrier = qb;
        ballCarrier.fy = Math.max(0, qb.fy - (4 + Math.random() * 3));
        finishPlayAtSpot("BLITZ SACK!");
        return;
      }
    }

    for (const d of defense) {
      clampFieldX(d, 1.0);
      clampDepth(d);
    }
    return;
  }

  const pursuitStrengths = { RUSH: 0.034, LB: 0.030, CB: 0.028, S: 0.026, S2: 0.026 };

  for (const d of defense) {
    const target = getPursuitTarget(d, ballCarrier);
    let strength = 0.026;
    if (d.role === "RUSH") strength = pursuitStrengths.RUSH;
    else if (d.role === "LB") strength = pursuitStrengths.LB;
    else if (d.role === "CB") strength = pursuitStrengths.CB;
    else if (d.role === "S" || d.role === "S2") strength = pursuitStrengths[d.role];

    d.fx += (target.fx - d.fx) * strength * tempo;
    d.fy += (target.fy - d.fy) * strength * tempo;
    clampFieldX(d, 1.0);
    clampDepth(d);
  }
}

function updateThrow() {
  if (!currentThrow) return;

  currentThrow.prevFx = currentThrow.fx;
  currentThrow.prevFy = currentThrow.fy;
  currentThrow.prevH = currentThrow.h;

  currentThrow.progress += currentThrow.speed;
  const t = Math.min(1, currentThrow.progress);

  currentThrow.fx = lerp(qb.fx, currentThrow.target.fx, t);
  currentThrow.fy = lerp(qb.fy, currentThrow.target.fy + (currentThrow.bullet ? 0 : 0.5), t);
  currentThrow.fy = Math.min(currentThrow.fy, FIELD.goalLine);

  const baseArc = currentThrow.bullet ? 9 : 18;
  const depthBonus = Math.min(12, currentThrow.distance * (currentThrow.bullet ? 0.45 : 0.75));
  currentThrow.h = Math.sin(t * Math.PI) * (baseArc + depthBonus);

  for (const d of defense) {
    const dist = Math.hypot(d.fx - currentThrow.fx, d.fy - currentThrow.fy);

    let pickRadius = 1.55;
    let pickChance = 0.010;

    if (d.role === "S" || d.role === "S2") {
      pickRadius = 2.05;
      pickChance = 0.020;
    } else if (d.role === "CB") {
      pickRadius = 1.68;
      pickChance = 0.013;
    } else if (d.role === "LB") {
      pickRadius = 1.60;
      pickChance = 0.012;
    }

    if (!currentThrow.bullet) {
      pickRadius += 0.22;
      pickChance += 0.005;
    }

    if (currentThrow.distance > 10) {
      pickRadius += 0.10;
      pickChance += 0.003;
    }

    if (dist < pickRadius && Math.random() < pickChance) {
      currentThrow = null;
      ballCarrier = null;
      resetDrive("INTERCEPTION!");
      return;
    }
  }

  if (t >= 1) {
    const target = currentThrow.target;

    let nearest = defense[0];
    let nearestDist = Math.hypot(target.fx - nearest.fx, target.fy - nearest.fy);
    for (const d of defense) {
      const dd = Math.hypot(target.fx - d.fx, target.fy - d.fy);
      if (dd < nearestDist) {
        nearestDist = dd;
        nearest = d;
      }
    }

    let catchChance;
    let breakupChance;

    if (currentThrow.bullet) {
      if (nearestDist < 1.4) {
        catchChance = 0.28;
        breakupChance = 0.52;
      } else if (nearestDist < 2.1) {
        catchChance = 0.58;
        breakupChance = 0.24;
      } else if (nearestDist < 3.0) {
        catchChance = 0.82;
        breakupChance = 0.10;
      } else {
        catchChance = 0.94;
        breakupChance = 0.03;
      }
    } else {
      if (nearestDist < 1.4) {
        catchChance = 0.16;
        breakupChance = 0.54;
      } else if (nearestDist < 2.1) {
        catchChance = 0.42;
        breakupChance = 0.30;
      } else if (nearestDist < 3.0) {
        catchChance = 0.72;
        breakupChance = 0.14;
      } else {
        catchChance = 0.90;
        breakupChance = 0.05;
      }
    }

    if (!currentThrow.bullet && currentThrow.distance > 10) {
      catchChance -= 0.08;
      breakupChance += 0.05;
    }

    const roll = Math.random();

    if (roll < catchChance) {
      ballCarrier = target;
      currentThrow = null;
    } else if (roll < catchChance + breakupChance) {
      currentThrow = null;
      ballCarrier = null;
      showPlayResult("PASS BROKEN UP");
    } else {
      currentThrow = null;
      ballCarrier = null;
      showPlayResult("INCOMPLETE");
    }
  }
}

function checkTackle() {
  if (!ballCarrier) return;

  if (game.selectedPlay === "run" && ballCarrier === rb && runForceFrames > 0) return;

  for (const d of defense) {
    if (Math.hypot(d.fx - ballCarrier.fx, d.fy - ballCarrier.fy) < 2.0) {
      finishPlayAtSpot("TACKLED");
      return;
    }
  }
}

function checkTouchdown() {
  if (!ballCarrier) return;
  if (ballCarrier.fy >= FIELD.goalLine) {
    ballCarrier.fy = FIELD.goalLine;
    resetDrive("TOUCHDOWN!");
  }
}

function getRoutePoints(p) {
  const pts = [{ fx: p.fx, fy: p.fy }];
  let fx = p.fx, fy = p.fy;

  switch (p.routeKind) {
    case "runInside":
      fy += 6.5; pts.push({fx, fy}); break;
    case "runOffTackle":
      fy += 4.5; pts.push({fx, fy}); fx += 3.0; fy += 2.2; pts.push({fx, fy}); break;
    case "runSweep":
      fy += 3.5; pts.push({fx, fy}); fx += 5.2; fy += 1.8; pts.push({fx, fy}); break;
    case "runCounter":
      fy += 3.0; pts.push({fx, fy}); fx -= 4.5; fy += 2.2; pts.push({fx, fy}); break;
    case "runDart":
      fy += 6.0; pts.push({fx, fy}); fx += 1.2; fy += 1.5; pts.push({fx, fy}); break;
    case "runStretch":
      fy += 3.0; pts.push({fx, fy}); fx += 6.0; fy += 1.2; pts.push({fx, fy}); break;
    case "runDraw":
      fy += 2.0; pts.push({fx, fy}); fy += 4.0; pts.push({fx, fy}); break;

    case "slantInsideLeft":
      fy += 2.2; pts.push({fx, fy}); fx += 3.2; fy += 1.5; pts.push({fx, fy}); break;
    case "slantInsideRight":
      fy += 2.2; pts.push({fx, fy}); fx -= 3.2; fy += 1.5; pts.push({fx, fy}); break;
    case "crossInsideRight":
      fy += 2.0; pts.push({fx, fy}); fx -= 4.2; fy += 1.4; pts.push({fx, fy}); break;
    case "curlMiddleLeft":
      fy += 3.0; pts.push({fx, fy}); fy -= 0.8; fx += 1.0; pts.push({fx, fy}); break;
    case "sitMiddleRight":
      fy += 1.8; pts.push({fx, fy}); fx -= 1.8; fy += 0.2; pts.push({fx, fy}); break;
    case "inLeft":
      fy += 2.4; pts.push({fx, fy}); fx += 3.8; fy += 0.8; pts.push({fx, fy}); break;
    case "inRight":
      fy += 2.4; pts.push({fx, fy}); fx -= 3.8; fy += 0.8; pts.push({fx, fy}); break;
    case "mediumPostRight":
      fy += 3.5; pts.push({fx, fy}); fx -= 2.0; fy += 1.5; pts.push({fx, fy}); break;
    case "mediumPostLeft":
      fy += 3.5; pts.push({fx, fy}); fx += 2.0; fy += 1.5; pts.push({fx, fy}); break;
    case "flatRight":
      fx -= 4.0; fy += 0.6; pts.push({fx, fy}); break;
    case "digLeft":
      fy += 3.4; pts.push({fx, fy}); fx += 4.6; fy += 0.8; pts.push({fx, fy}); break;
    case "stickLeft":
      fy += 1.8; pts.push({fx, fy}); fy -= 0.3; fx += 0.8; pts.push({fx, fy}); break;
    case "quickOutRight":
      fy += 1.0; pts.push({fx, fy}); fx -= 3.8; fy += 0.3; pts.push({fx, fy}); break;

    case "goBendLeft":
      fy += 7.5; pts.push({fx, fy}); fx += 1.2; fy += 2.0; pts.push({fx, fy}); break;
    case "goBendRight":
      fy += 7.5; pts.push({fx, fy}); fx -= 1.2; fy += 2.0; pts.push({fx, fy}); break;
    case "postInsideRight":
      fy += 5.0; pts.push({fx, fy}); fx -= 2.4; fy += 2.2; pts.push({fx, fy}); break;
    case "postInsideLeft":
      fy += 5.0; pts.push({fx, fy}); fx += 2.4; fy += 2.2; pts.push({fx, fy}); break;
    case "deepCrossRight":
      fy += 3.8; pts.push({fx, fy}); fx -= 5.0; fy += 2.0; pts.push({fx, fy}); break;
    case "deepCrossLeft":
      fy += 3.8; pts.push({fx, fy}); fx += 5.0; fy += 2.0; pts.push({fx, fy}); break;
    case "streakBendLeft":
      fy += 8.0; pts.push({fx, fy}); fx += 0.8; fy += 1.5; pts.push({fx, fy}); break;
    case "streakBendRight":
      fy += 8.0; pts.push({fx, fy}); fx -= 0.8; fy += 1.5; pts.push({fx, fy}); break;
    case "cornerLeft":
      fy += 5.0; pts.push({fx, fy}); fx -= 3.4; fy += 1.8; pts.push({fx, fy}); break;
    case "seamLeft":
      fy += 8.0; pts.push({fx, fy}); break;
    case "overRight":
      fy += 3.5; pts.push({fx, fy}); fx -= 4.0; fy += 2.2; pts.push({fx, fy}); break;
  }

  return pts;
}

function drawRouteLine(p, color = "rgba(255,255,255,0.96)") {
  const pts = getRoutePoints(p);
  if (pts.length < 2) return;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  ctx.beginPath();
  const first = projectFieldPoint(pts[0].fx, pts[0].fy);
  ctx.moveTo(first.x, first.y);

  for (let i = 1; i < pts.length; i++) {
    const pr = projectFieldPoint(pts[i].fx, pts[i].fy);
    ctx.lineTo(pr.x, pr.y);
  }

  ctx.stroke();
  ctx.restore();
}

function drawEndZone() {
  const leftGoal = projectFieldPoint(-FIELD.widthHalf, FIELD.goalLine);
  const rightGoal = projectFieldPoint(FIELD.widthHalf, FIELD.goalLine);
  const leftBack = projectFieldPoint(-FIELD.widthHalf, FIELD.backOfEndZone);
  const rightBack = projectFieldPoint(FIELD.widthHalf, FIELD.backOfEndZone);

  ctx.save();

  ctx.fillStyle = "rgba(30, 90, 210, 0.75)";
  ctx.beginPath();
  ctx.moveTo(leftGoal.x, leftGoal.y);
  ctx.lineTo(rightGoal.x, rightGoal.y);
  ctx.lineTo(rightBack.x, rightBack.y);
  ctx.lineTo(leftBack.x, leftBack.y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(leftGoal.x, leftGoal.y);
  ctx.lineTo(rightGoal.x, rightGoal.y);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,0.65)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(leftBack.x, leftBack.y);
  ctx.lineTo(rightBack.x, rightBack.y);
  ctx.stroke();

  const midX = (leftGoal.x + rightGoal.x) / 2;
  const midY = (leftGoal.y + leftBack.y) / 2;

  ctx.translate(midX, midY);
  ctx.scale(1, 0.7);
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "bold 24px Arial";
  ctx.textAlign = "center";
  ctx.fillText("END ZONE", 0, 0);

  ctx.restore();
}

function drawField() {
  ctx.fillStyle = "#1e7d34";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawEndZone();

  const sidelineL1 = projectFieldPoint(-FIELD.widthHalf, game.lineOfScrimmage - 12);
  const sidelineL2 = projectFieldPoint(-FIELD.widthHalf, FIELD.backOfEndZone);
  const sidelineR1 = projectFieldPoint(FIELD.widthHalf, game.lineOfScrimmage - 12);
  const sidelineR2 = projectFieldPoint(FIELD.widthHalf, FIELD.backOfEndZone);

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(sidelineL1.x, sidelineL1.y);
  ctx.lineTo(sidelineL2.x, sidelineL2.y);
  ctx.moveTo(sidelineR1.x, sidelineR1.y);
  ctx.lineTo(sidelineR2.x, sidelineR2.y);
  ctx.stroke();

  for (let yard = Math.floor(game.lineOfScrimmage); yard <= FIELD.backOfEndZone; yard += 5) {
    const left = projectFieldPoint(-FIELD.widthHalf, yard);
    const right = projectFieldPoint(FIELD.widthHalf, yard);

    let color = "rgba(255,255,255,0.24)";
    let width = 2;

    if (yard === game.firstDownTarget && yard < FIELD.goalLine) {
      color = "#ffd166";
      width = 4;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(left.x, left.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
  }

  const losL = projectFieldPoint(-FIELD.widthHalf, game.lineOfScrimmage);
  const losR = projectFieldPoint(FIELD.widthHalf, game.lineOfScrimmage);

  ctx.strokeStyle = "rgba(0,200,255,0.78)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(losL.x, losL.y);
  ctx.lineTo(losR.x, losR.y);
  ctx.stroke();
}

function drawPlayer(p) {
  const pr = projectFieldPoint(p.fx, p.fy);
  const r = 12 * pr.scale;

  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.beginPath();
  ctx.ellipse(pr.x, pr.y + r * 1.15, r * 0.95, r * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(pr.x, pr.y, r, 0, Math.PI * 2);
  ctx.fill();

  if ((p === wr1 || p === wr2 || p === rb) && !game.playStarted) {
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, r + 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  if ((p === wr1 || p === wr2) && game.playStarted && p.isOpen) {
    ctx.fillStyle = "#f4d35e";
    ctx.beginPath();
    ctx.arc(pr.x, pr.y - (14 * pr.scale), 4.5 * pr.scale, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBall() {
  if (!currentThrow) return;

  const pr = projectFieldPoint(currentThrow.fx, currentThrow.fy);
  const prev = projectFieldPoint(currentThrow.prevFx, currentThrow.prevFy);
  const arcLift = currentThrow.h;

  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(prev.x, prev.y - currentThrow.prevH * 0.6);
  ctx.lineTo(pr.x, pr.y - arcLift * 0.6);
  ctx.stroke();

  const bx = pr.x;
  const by = pr.y - arcLift * 0.6;

  ctx.fillStyle = "#8b5a2b";
  ctx.beginPath();
  ctx.ellipse(bx, by, 9 * pr.scale, 5 * pr.scale, -0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#d9a066";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(bx, by, 9 * pr.scale, 5 * pr.scale, -0.35, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawPreSnapRoutes() {
  if (game.playStarted || !game.selectedPlay) return;
  drawRouteLine(wr1, "rgba(255,255,255,0.96)");
  drawRouteLine(wr2, "rgba(255,255,255,0.96)");
  if (game.selectedPlay === "run") drawRouteLine(rb, "rgba(255,215,0,0.96)");
}

function drawPlayResult() {
  if (playResultTimer <= 0 || !playResultText) return;

  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(canvas.width * 0.16, canvas.height * 0.37, canvas.width * 0.68, 86);

  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 34px Arial";
  ctx.textAlign = "center";
  ctx.fillText(playResultText, canvas.width / 2, canvas.height * 0.37 + 54);
  ctx.restore();
}

function draw() {
  drawField();
  if (!offense.length) return;
  drawPreSnapRoutes();
  offense.forEach(drawPlayer);
  defense.forEach(drawPlayer);
  drawBall();
  drawPlayResult();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

buildFormation();
updateHud();
loop();
</script>
</body>
